[env:lolin_c3_mini]
platform = espressif32
board = lolin_c3_mini
framework = arduino
monitor_speed = 115200

; Wymuszenie sygnałów DTR/RTS aby terminal PlatformIO otwierał poprawnie natywne połączenie USB
monitor_dtr = 1
monitor_rts = 0

; Wymuszenie stabilnego połączenia USB dla klonów C3
build_flags = 
    -D CORE_DEBUG_LEVEL=0
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.1
    adafruit/Adafruit BMP3XX Library @ ^2.1.2
    adafruit/Adafruit LSM6DS @ ^4.7.0
    olikraus/U8g2 @ ^2.34.17