name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: pwa/package-lock.json

      - name: Install
        run: cd pwa && npm ci

      - name: Build
        run: cd pwa && npm run build -- --base=/Crux_test_online/

      - name: SPA fallback (404 → index)
        run: cp pwa/dist/index.html pwa/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pwa/dist

      - id: deploy
        uses: actions/deploy-pages@v4
